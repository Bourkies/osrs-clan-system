# ---------------------------------------------------------------------- #
#    EXAMPLE HISTORICAL PERSONAL BESTS - RENAME TO .toml WHEN USING      #
# ---------------------------------------------------------------------- #
# This file defines the structure, filtering, and starting records for the Personal Bests page.
# You can pre-seed it with historical records or leave the times as "0:00" to start fresh.
#
# Each record can have the following fields:
# - name: The exact name of the task as it appears in the Discord message. (Required)
# - time: The historical time or score for the record. Use "0:00" for time, or "0" for scores. (Required)
# - holder: The historical holder(s) of the record. Can be a string or a list of strings. (Required)
# - discord_emoji: An optional Discord emoji to display next to the record name.
#   - For standard Unicode emojis, use the emoji itself (e.g., "🥋").
#   - For custom server emojis, you must use the full emoji code: "<:emoji_name:emoji_id>".
#     To get this, type \:emoji_name: in Discord and it will reveal the full code.
# - metric: (Optional) Set to "score" for point-based records instead of time-based ones. Defaults to "time".
# - label: (Optional) The text displayed above the value. Defaults to "Time".
# - display_name: (Optional) Overrides the `name` field for display on the dashboard.
# - date: (Optional) A manual date override in "YYYY-MM-DD" format for historical records.


# --- Settings ---
# Defines the name for the group that catches any records not listed in the groups below.
other_group_name = "Miscellaneous PBs"
# Default sorting for the dashboard. Options: "config", "alphabetical"
default_group_sort = "config"
default_item_sort = "config" # Or "config" to sort by the order below
recent_PB_count = 5 # add this number of the latest PB's to the miscellaneous PB's post, disabled if set to 0

# --- Personal Best Blacklist ---
# Use this to prevent certain users from holding records.
# Rules are applied *after* username remapping from the main config has been completed.
#
# You can use either their current `username` (RSN) or their static `discord_id`.
# Using `discord_id` is highly recommended to make the blacklist immune to name changes.
#
# Example 1: Blacklist a user from a specific task under a certain time:
#   { username = "PayedForCoxTime", task_name = "Chambers of Xeric (Team Size: Solo)", max_time = "16:22.60" }
#   { id = "123456789012345678", task_name = "Inferno", max_time = "45:00" }
#
# Example 2: Blacklist a user from ALL personal bests entirely:
#   { username = "KnownCheater" }
#   { id = "123456789012345678" }
#
blacklist = [
]

# --- Filtering Rules ---
# A record is excluded if its task name contains ALL strings within any single rule set.
exclude_rules = [
    ["Tombs of Amascut", "Challenge"],
    ["Tombs of Amascut", "Entry mode"],
    ["Theatre of Blood", "Entry mode"]
]

# --- Record Holders & The Enriched Database ---
# If you are using the Enriched Database (use_enriched_db_for_dashboard = true), you can
# specify record holders using an inline dictionary containing both their `rsn` and `id`
# (their Discord Snowflake). This makes their historical record immune to RSN changes!
#
# Example 1: Standard text fallback (Vulnerable to name changes, breaks if drop_leavers_from_data=True)
#   holder = "Zezima"
#
# Example 2: Single Holder Dictionary (Recommended)
#   holder = { rsn = "Zezima", id = "123456789012345678" }
#
# Example 3: Multiple Holders (Team Records)
#   holder = [ { rsn = "Zezima", id = "111" }, { rsn = "Woox", id = "222" } ]
#
# NOTE on "drop_leavers_from_data":
# - If False: The system prefers the `id`. If the ID isn't found, it safely falls back to the `rsn` text.
# - If True: The system strictly checks the `id` against the roster's "Is_Retained" flag. If the user
#   has left the clan and their grace period expired, their record is wiped. Plain text strings 
#   will be wiped immediately.
# ----------------------------------------------

# --- Record Groups ---
# Groups will be displayed on the dashboard in the order they appear here.
# Records will be displayed in the order they appear if default_item_sort is "config".

