# dashboard_texts.toml
# Stores configuration for UI elements like custom messages and titles.

# --- Available Variables for Text Replacement ---
# General Leaderboards (Podiums):
#   {player} : The name of the player for that specific rank (Colored to match their rank).
#   {value}  : The primary score/value (e.g., GP earned, total kills).
#   {count}  : The secondary score/count (e.g., number of drops, number of deaths).
#   {rank_1}, {rank_2}, {rank_3} : Mentions the player sitting in that specific rank (Colored to match that rank).
#
# Achievements & Recent Events (Used on specific pages):
#   {date}   : Date of the event.
#   {skill}, {level} : Used for Level Ups / Maxing.
#   {task}, {tier} : Used for Combat Tasks / Combat Achievements.
#   {diary}, {pet_name}, {quest_name} : Self-explanatory.
#   {lives}  : Remaining group lives for HCIM deaths.
# ----------------------------------------------
# Useful Emojis for Copy-Pasting:
# Medals & Trophies: 🥇 🥈 🥉 🏆 👑 🏅
# Money & Loot:      💰 🪙 🤑 💸 📈 📉 💎
# Combat & Death:    💀 ⚔️ 🏹 🎯 🔥 🪦 💔 🩸 🛡️
# Reactions & Chat:  🎉 🙌 🎊 🗣️ 🔊 📢 🔇 💬 💥
# Skilling & Magic:  🔼 🚀 🆙 🧠 🧊 ⚡ ✨ 📚 🗺️ 📜
# Pets & Animals:    🐾 🐀 🦝 🐭 🐑 🐸 🦆 🐄 🐍 🦇
# Nature & Outdoors: 🌿 🌱 🌾 🌳 🌲 🌞 🏕️ 🪵 ⛰️ 🍄 🧑‍🌾 👨‍🌾 👩‍🌾
# Misc/Memes:        👢 🚪 🥾 🧹 🔫 👮 🧀 🧻 🧂 🍺 🪃
# ----------------------------------------------

